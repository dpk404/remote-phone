name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release-keystore.jks

      - name: Create keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/keystore.properties << EOF
          storeFile=app/release-keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cp android/app/build/outputs/apk/release/app-release.apk RemotePhone-${VERSION}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: RemotePhone-*.apk

  bundle-client:
    name: Bundle Linux Client
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create client tarball
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          tar -czf RemotePhone-linux-${VERSION}.tar.gz \
            --transform "s|^linux_client|RemotePhone-linux-${VERSION}|" \
            linux_client/

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-client
          path: RemotePhone-linux-*.tar.gz

  create-release:
    name: Create GitHub Release
    needs: [build-apk, bundle-client]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk

      - name: Download Linux client
        uses: actions/download-artifact@v4
        with:
          name: linux-client

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          gh release create "v${VERSION}" \
            --title "RemotePhone v${VERSION}" \
            --generate-notes \
            RemotePhone-${VERSION}.apk \
            RemotePhone-linux-${VERSION}.tar.gz
